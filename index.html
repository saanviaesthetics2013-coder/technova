<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Atlas WebOS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loader">
  <div class="logo">Atlas WebOS</div>
  <div class="bar"></div>
</div>

<!-- DESKTOP -->
<div id="desktop" class="hidden">

  <!-- NOTES WINDOW -->
  <div class="window" id="notesWin">
    <div class="titlebar" onmousedown="dragStart(event,'notesWin')">
      <span>Notes</span>
      <button onclick="closeWin('notesWin')">✕</button>
    </div>

    <div class="content">
      <input id="noteInput" placeholder="Write a note...">
      <button onclick="addNote()">Save</button>
      <ul id="noteList"></ul>
    </div>
  </div>

  <!-- AI WINDOW -->
  <div class="window hidden" id="aiWin">
    <div class="titlebar" onmousedown="dragStart(event,'aiWin')">
      <span>Atlas AI</span>
      <button onclick="closeWin('aiWin')">✕</button>
    </div>

    <div class="content">
      <input id="aiInput" placeholder="Ask something...">
      <button onclick="askAI()">Ask</button>
      <p id="aiOut"></p>
    </div>
  </div>

  <!-- GAME WINDOW -->
  <div class="window hidden" id="gameWin">
    <div class="titlebar" onmousedown="dragStart(event,'gameWin')">
      <span>Game</span>
      <button onclick="closeWin('gameWin')">✕</button>
    </div>

    <div class="content">
      <button onclick="game()">Start Game</button>
      <p id="gameOut"></p>
    </div>
  </div>

</div>

<!-- DOCK -->
<div class="dock hidden" id="dock">
  <button onclick="openWin('notesWin')">📝</button>
  <button onclick="openWin('aiWin')">🧠</button>
  <button onclick="openWin('gameWin')">🎮</button>
</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
