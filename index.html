
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NEO HUB</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="bg"></canvas>

<header>
  <h1 class="glow">NEO HUB</h1>
  <button onclick="toggleSound()">🎧</button>
</header>

<div class="container">

  <div class="card" onclick="openModule('calculator')">🧮</div>
  <div class="card" onclick="openModule('game')">🎮</div>
  <div class="card" onclick="openModule('voice')">🎤</div>
  <div class="card" onclick="openModule('terminal')">💻</div>
  <div class="card" onclick="openModule('ai')">🧠</div>

</div>

<div id="module-container"></div>

<audio id="bg-sound" loop>
  <source src="assets/sounds/ambient.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
<script src="modules/calculator.js"></script>
<script src="modules/game.js"></script>
<script src="modules/voice.js"></script>
<script src="modules/terminal.js"></script>
<script src="modules/ai.js"></script>

</body>
</html>
